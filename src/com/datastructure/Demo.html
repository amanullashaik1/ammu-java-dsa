<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LLM Visualizer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

input{
width:70%;
padding:12px;
font-size:16px;
}

button{
padding:10px 18px;
margin:8px;
font-size:15px;
border:none;
background:#38bdf8;
cursor:pointer;
}

.stage{
background:#1e293b;
margin-top:20px;
padding:20px;
border-radius:8px;
}

.token{
display:inline-block;
padding:8px 12px;
margin:5px;
background:#334155;
border-radius:6px;
}

.attention{
background:#22c55e;
color:black;
}

.bar{
height:20px;
background:#38bdf8;
margin:6px auto;
}

.label{
margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>LLM Architecture Visualizer</h1>

<p>Explore how an LLM processes prompts step by step.</p>

<input id="prompt" placeholder="Type your prompt here">

<br>

<button onclick="tokenize()">1 Tokenize</button>
<button onclick="embedding()">2 Embedding</button>
<button onclick="attention()">3 Attention</button>
<button onclick="predict()">4 Next Token</button>
<button onclick="generate()">5 Generate</button>

<div class="stage">
<h3>Tokens</h3>
<div id="tokens"></div>
</div>

<div class="stage">
<h3>Embeddings</h3>
<div id="embeddings"></div>
</div>

<div class="stage">
<h3>Attention Focus</h3>
<div id="attention"></div>
</div>

<div class="stage">
<h3>Next Token Probabilities</h3>
<div id="probabilities"></div>
</div>

<div class="stage">
<h3>Generated Response</h3>
<div id="output"></div>
</div>

</div>

<script>

let tokens=[]

function tokenize(){

let text=document.getElementById("prompt").value
tokens=text.split(" ")

let html=""

tokens.forEach(t=>{
html+=`<span class="token">${t}</span>`
})

document.getElementById("tokens").innerHTML=html

}

function embedding(){

let html=""

tokens.forEach(t=>{

let vec=[]

for(let i=0;i<5;i++){
vec.push(Math.random().toFixed(2))
}

html+=`<div>${t} → [${vec.join(", ")}]</div>`

})

document.getElementById("embeddings").innerHTML=html

}

function attention(){

let html=""

tokens.forEach(t=>{

let important=Math.random()>0.5

html+=`<span class="token ${important?"attention":""}">
${t}
</span>`

})

document.getElementById("attention").innerHTML=html

}

function predict(){

let words=["AI","data","systems","future","technology"]

let html=""

words.forEach(w=>{

let prob=Math.random()

let width=prob*300

html+=`
<div class="label">${w}</div>
<div class="bar" style="width:${width}px"></div>
`

})

document.getElementById("probabilities").innerHTML=html

}

function generate(){

let endings=[
"is transforming industries",
"will change software development",
"is powered by transformers",
"learns from massive datasets",
"helps automate knowledge work"
]

let text=document.getElementById("prompt").value

let result=endings[Math.floor(Math.random()*endings.length)]

document.getElementById("output").innerText=text+" "+result

}

</script>

</body>
</html>
